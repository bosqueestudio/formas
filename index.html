 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Formas Orgánicas - Merge Canvas</title>
    <style>
        :root {
            --bg-color: #f5f5f5;
            --panel-bg: #ffffff;
            --text-color: #000000;
        }

        * {
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            overflow: hidden;
        }

        /* BARRA DE HERRAMIENTAS (UI/UX) */
        .toolbar {
            width: 280px;
            background: var(--panel-bg);
            border-right: 2px solid #000;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.02);
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 10px 0;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #555;
        }

        select, input[type="color"], button {
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
            border: 2px solid #000;
            background: #fff;
            cursor: pointer;
            border-radius: 0;
            outline: none;
            transition: all 0.2s ease;
        }

        select:hover, button:hover {
            background: #f0f0f0;
        }

        input[type="color"] {
            height: 50px;
            padding: 2px;
        }

        button.btn-save {
            background: #000;
            color: #fff;
            margin-top: auto;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.btn-save:hover {
            background: #333;
        }

        button.btn-clear {
            background: #fff;
            color: #ff4444;
            border-color: #ff4444;
        }
        button.btn-clear:hover {
            background: #fff5f5;
        }

        /* ÁREA DEL LIENZO */
        .canvas-container {
            flex-grow: 1;
            height: 100%;
            position: relative;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .status-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.8rem;
            color: #888;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>Creador de Blobs</h2>
        
        <div class="tool-group">
            <label for="pixel-shape">Forma del Píxel</label>
            <select id="pixel-shape">
                <option value="circle">Círculo</option>
                <option value="square">Cuadrado</option>
                <option value="diamond">Diamante</option>
            </select>
        </div>

        <div class="tool-group">
            <label for="fill-color">Color de Relleno</label>
            <input type="color" id="fill-color" value="#f4f3b6">
        </div>

        <div class="tool-group">
            <label for="pixel-size">Tamaño de la Forma</label>
            <select id="pixel-size">
                <option value="40">Pequeño</option>
                <option value="80" selected>Mediano</option>
                <option value="130">Grande</option>
            </select>
        </div>

        <button class="btn-clear" onclick="clearCanvas()">Limpiar Lienzo</button>
        <button class="btn-save" onclick="saveAsset()">Guardar Asset (.PNG)</button>
    </div>

    <div class="canvas-container" id="canvas-holder">
        <canvas id="paintCanvas"></canvas>
        <div class="status-info">Dibuja lento para formas fluidas</div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-holder');

        // Canvas oculto (Buffer) para lograr el efecto de fusión (Merge)
        const bufferCanvas = document.createElement('canvas');
        const bCtx = bufferCanvas.getContext('2d');

        const shapeSelect = document.getElementById('pixel-shape');
        const colorInput = document.getElementById('fill-color');
        const sizeSelect = document.getElementById('pixel-size');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        function resizeCanvas() {
            const w = container.clientWidth;
            const h = container.clientHeight;
            
            canvas.width = w;
            canvas.height = h;
            bufferCanvas.width = w;
            bufferCanvas.height = h;
            
            clearCanvas();
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);

        function drawDiamondPath(context, x, y, size) {
            context.beginPath();
            context.moveTo(x, y - size / 2);
            context.lineTo(x + size / 2, y);
            context.lineTo(x, y + size / 2);
            context.lineTo(x - size / 2, y);
            context.closePath();
        }

        // Dibuja la forma individual en el buffer oculto (solo el relleno)
        function drawShapeOnBuffer(x, y) {
            const shape = shapeSelect.value;
            const size = parseInt(sizeSelect.value);
            
            bCtx.fillStyle = colorInput.value;

            if (shape === 'circle') {
                bCtx.beginPath();
                bCtx.arc(x, y, size / 2, 0, Math.PI * 2);
                bCtx.fill();
            } else if (shape === 'square') {
                bCtx.beginPath();
                bCtx.rect(x - size / 2, y - size / 2, size, size);
                bCtx.fill();
            } else if (shape === 'diamond') {
                drawDiamondPath(bCtx, x, y, size);
                bCtx.fill();
            }
        }

        // Renderiza el buffer en la pantalla aplicando el contorno negro (Merge Effect)
        function renderBufferToMain() {
            // Limpiamos el lienzo visible con fondo blanco
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Filtro avanzado por código: Para pintar el stroke exterior de 1px sin interceptar el interior,
            // dibujamos el buffer original encima de sí mismo desplazado sutilmente, o usamos la técnica de stroke vectorial.
            // Para mantener performance óptimo y bordes limpios en tiempo real:
            ctx.drawImage(bufferCanvas, 0, 0);

            // Generamos el contorno negro exterior de 1px usando composición de trazo
            ctx.shadowColor = '#000000';
            ctx.shadowBlur = 1;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            // Redibujamos la silueta para marcar el borde perimetral
            ctx.drawImage(bufferCanvas, 0, 0);
            
            // Reseteamos sombras para no afectar otros renders
            ctx.shadowBlur = 0;
        }

        // Interpolación lineal para rellenar los huecos vacíos del trackpad (Evita el scattering)
        function drawInterpolated(startX, startY, endX, endY) {
            const distance = Math.hypot(endX - startX, endY - startY);
            // Definimos que estampe una figura mínimo cada 2 píxeles de movimiento para pegarlas por completo
            const steps = Math.max(Math.floor(distance / 2), 1); 

            for (let i = 0; i < steps; i++) {
                const t = i / steps;
                const x = startX + (endX - startX) * t;
                const y = startY + (endY - startY) * t;
                drawShapeOnBuffer(x, y);
            }
            
            renderBufferToMain();
        }

        // --- MANEJADORES DE EVENTOS ---

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            }
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const coords = getCoords(e);
            lastX = coords.x;
            lastY = coords.y;
            drawShapeOnBuffer(lastX, lastY);
            renderBufferToMain();
        }

        function moveDrawing(e) {
            if (!isDrawing) return;
            e.preventDefault(); // Previene scroll en trackpads/móviles
            const coords = getCoords(e);
            
            // Dibuja conectando el punto anterior con el actual de forma ultra compacta
            drawInterpolated(lastX, lastY, coords.x, coords.y);
            
            lastX = coords.x;
            lastY = coords.y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // Eventos Mouse y Trackpad
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', moveDrawing);
        window.addEventListener('mouseup', stopDrawing);

        // Eventos Touch / Trackpad de precisión
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', moveDrawing, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        // --- ACCIONES ---

        function clearCanvas() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            bCtx.clearRect(0, 0, bufferCanvas.width, bufferCanvas.height);
        }

        function saveAsset() {
            const link = document.createElement('a');
            const dateStr = new Date().toISOString().slice(0,19).replace(/:/g, '-');
            link.download = `blob-fusionado-${dateStr}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>

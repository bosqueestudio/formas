 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Orgánico Pro - Final Fixed</title>
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --panel-bg: #1a1a1a;
            --text-light: #ffffff;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            overflow: hidden;
            color: var(--text-light);
        }

        /* UI PANEL LATERAL */
        .toolbar {
            width: 300px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            overflow-y: auto;
            flex-shrink: 0;
        }

        h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 5px 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            color: #fff;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .color-pickers {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        label {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #888;
        }

        select, input[type="color"], button {
            width: 100%;
            padding: 10px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            background: #222;
            color: #fff;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        select:hover, button:hover {
            background: #2a2a2a;
            border-color: #555;
        }

        input[type="color"] {
            height: 40px;
            padding: 2px;
            border-radius: 4px;
        }

        .btn-clear { color: #ff5555; border-color: #552222; }
        .btn-clear:hover { background: #331111; }
        
        .btn-action { background: #ffffff; color: #000000; font-weight: bold; text-transform: uppercase; }
        .btn-action:hover { background: #dddddd; }

        .btn-anim { background: #007bff; color: white; font-weight: bold; text-transform: uppercase;}
        .btn-anim:hover { background: #0056b3; }

        .download-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        /* LIENZO DE DIBUJO */
        .canvas-container {
            flex-grow: 1;
            height: 100%;
            position: relative;
            background: var(--bg-dark);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .status-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.75rem;
            color: #555;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>Blob Generator OS</h2>
        
        <div class="tool-group">
            <label>Forma del Píxel</label>
            <select id="pixel-shape">
                <option value="circle">Círculo</option>
                <option value="square">Cuadrado</option>
                <option value="diamond">Diamante</option>
            </select>
        </div>

        <div class="tool-group">
            <label>Combinación de Colores</label>
            <div class="color-pickers">
                <div>
                    <label style="font-size:10px;">Centro</label>
                    <input type="color" id="color-center" value="#f4f3b6">
                </div>
                <div>
                    <label style="font-size:10px;">Eco 1</label>
                    <input type="color" id="color-echo1" value="#e3a7fd">
                </div>
                <div>
                    <label style="font-size:10px;">Eco 2</label>
                    <input type="color" id="color-echo2" value="#9ef8db">
                </div>
            </div>
        </div>

        <div class="tool-group">
            <label>Escala Base</label>
            <select id="pixel-size">
                <option value="50">Fino</option>
                <option value="90" selected>Estándar</option>
                <option value="150">Masivo</option>
            </select>
        </div>

        <div class="tool-group">
            <label>Imperfección / Torpeza</label>
            <select id="brush-clumsy">
                <option value="0.2">Sutil</option>
                <option value="0.5" selected>Orgánica Orgullosa</option>
                <option value="0.9">Torpe / Salvaje</option>
            </select>
        </div>

        <hr style="border:0; border-top: 1px solid var(--border-color); width:100%; margin: 5px 0;">

        <button class="btn-clear" onclick="clearCanvas()">Limpiar Lienzo</button>
        <button class="btn-anim" onclick="playDrawingAnimation()">▶ Re-Animar Trazo</button>
        
        <div class="tool-group">
            <label>Exportar Formatos Estáticos</label>
            <div class="download-grid">
                <button class="btn-action" style="font-size:11px;" onclick="saveAsset('16:9')">16:9 (HD)</button>
                <button class="btn-action" style="font-size:11px;" onclick="saveAsset('3:5')">3:5 (Vertical)</button>
            </div>
        </div>
    </div>

    <div class="canvas-container" id="canvas-holder">
        <canvas id="paintCanvas"></canvas>
        <div class="status-info" id="status-text">Lienzo Listo</div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-holder');

        let strokeHistory = []; 
        let isDrawing = false;

        let clumsyX = 0;
        let clumsyY = 0;

        // Forzar inicialización limpia adaptada al DOM
        function initCanvasSize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            resetCanvasBackground(ctx, canvas.width, canvas.height);
            redrawFromHistory();
        }

        // Eventos de redimensionamiento normales
        window.addEventListener('resize', initCanvasSize);
        
        // FIX CRÍTICO: Esperar un delay seguro para que las dimensiones no se inicialicen en cero
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(initCanvasSize, 100);
        });

        function resetCanvasBackground(context, width, height) {
            context.fillStyle = "#0d0d0d"; 
            context.fillRect(0, 0, width, height);
        }

        function drawEchos(context, x, y, shape, size, cCenter, cEcho1, cEcho2) {
            context.save();
            
            // Forzar siempre stroke negro de 1px
            context.strokeStyle = '#000000';
            context.lineWidth = 1;

            // Eco Exterior 2
            context.fillStyle = cEcho2;
            renderSingleGeom(context, x, y, shape, size * 1.3);
            context.stroke();

            // Eco Interior 1
            context.fillStyle = cEcho1;
            renderSingleGeom(context, x, y, shape, size * 1.15);
            context.stroke();

            // Núcleo Centro
            context.fillStyle = cCenter;
            renderSingleGeom(context, x, y, shape, size);
            context.stroke();

            context.restore();
        }

        function renderSingleGeom(context, x, y, shape, size) {
            context.beginPath();
            if (shape === 'circle') {
                context.arc(x, y, size / 2, 0, Math.PI * 2);
            } else if (shape === 'square') {
                context.rect(x - size / 2, y - size / 2, size, size);
            } else if (shape === 'diamond') {
                context.moveTo(x, y - size / 2);
                context.lineTo(x + size / 2, y);
                context.lineTo(x, y + size / 2);
                context.lineTo(x - size / 2, y);
                context.closePath();
            }
            context.fill();
        }

        function addStrokePoint(rawX, rawY, isNewNode = false) {
            const clumsyFactor = parseFloat(document.getElementById('brush-clumsy').value);
            const size = parseInt(document.getElementById('pixel-size').value);

            if (isNewNode) {
                clumsyX = rawX;
                clumsyY = rawY;
            } else {
                // Filtro de suavizado inercial
                clumsyX += (rawX - clumsyX) * 0.25;
                clumsyY += (rawY - clumsyY) * 0.25;

                // Modificador orgánico aleatorio
                const jitter = (size * clumsyFactor) * 0.05;
                clumsyX += (Math.random() - 0.5) * jitter;
                clumsyY += (Math.random() - 0.5) * jitter;
            }

            const pointData = {
                x: clumsyX,
                y: clumsyY,
                shape: document.getElementById('pixel-shape').value,
                size: size,
                cCenter: document.getElementById('color-center').value,
                cEcho1: document.getElementById('color-echo1').value,
                cEcho2: document.getElementById('color-echo2').value
            };

            strokeHistory.push(pointData);
            
            // Imprimir directo en pantalla
            drawEchos(ctx, pointData.x, pointData.y, pointData.shape, pointData.size, pointData.cCenter, pointData.cEcho1, pointData.cEcho2);
        }

        // Lógica simplificada de captura de coordenadas
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;

            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }

            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handleStart(e) {
            isDrawing = true;
            const coords = getCanvasCoords(e);
            addStrokePoint(coords.x, coords.y, true);
        }

        function handleMove(e) {
            if (!isDrawing) return;
            if (e.cancelable) e.preventDefault(); 
            const coords = getCanvasCoords(e);
            addStrokePoint(coords.x, coords.y, false);
        }

        function handleEnd() {
            isDrawing = false;
        }

        // Vinculación segura de oyentes
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd);

        function redrawFromHistory() {
            resetCanvasBackground(ctx, canvas.width, canvas.height);
            for(let pt of strokeHistory) {
                drawEchos(ctx, pt.x, pt.y, pt.shape, pt.size, pt.cCenter, pt.cEcho1, pt.cEcho2);
            }
        }

        // ANIMACIÓN CINEMÁTICA CON EASE
        function playDrawingAnimation() {
            if (strokeHistory.length === 0) return;
            
            let index = 0;
            const totalPoints = strokeHistory.length;
            const statusTxt = document.getElementById('status-text');
            
            function animateLoop() {
                if (index === 0) {
                    resetCanvasBackground(ctx, canvas.width, canvas.height);
                }

                let progress = index / totalPoints;
                let stepSpeed = 1;

                if (progress < 0.15 || progress > 0.85) {
                    stepSpeed = Math.max(1, Math.floor(totalPoints * 0.008));
                } else {
                    stepSpeed = Math.max(2, Math.floor(totalPoints * 0.03));
                }

                const nextTarget = Math.min(index + stepSpeed, totalPoints);
                
                for (let i = index; i < nextTarget; i++) {
                    const pt = strokeHistory[i];
                    drawEchos(ctx, pt.x, pt.y, pt.shape, pt.size, pt.cCenter, pt.cEcho1, pt.cEcho2);
                }

                index = nextTarget;
                statusTxt.innerText = `Animando: ${Math.floor(progress * 100)}%`;

                if (index < totalPoints) {
                    requestAnimationFrame(animateLoop);
                } else {
                    statusTxt.innerText = `Animación Lista`;
                }
            }
            
            requestAnimationFrame(animateLoop);
        }

        // EXPORTACIÓN EN ALTA RESOLUCIÓN
        function saveAsset(format) {
            if (strokeHistory.length === 0) {
                alert("Dibuja algo antes de exportar.");
                return;
            }

            const exportCanvas = document.createElement('canvas');
            const eCtx = exportCanvas.getContext('2d');

            let targetW = 1920;
            let targetH = 1080;

            if (format === '3:5') {
                targetW = 1080;
                targetH = 1350;
            }

            exportCanvas.width = targetW;
            exportCanvas.height = targetH;

            resetCanvasBackground(eCtx, targetW, targetH);

            const scaleX = targetW / canvas.width;
            const scaleY = targetH / canvas.height;
            const masterScale = Math.min(scaleX, scaleY) * 0.85; 

            const offsetX = (targetW - canvas.width * masterScale) / 2;
            const offsetY = (targetH - canvas.height * masterScale) / 2;

            for (let pt of strokeHistory) {
                const mappedX = pt.x * masterScale + offsetX;
                const mappedY = pt.y * masterScale + offsetY;
                const mappedSize = pt.size * masterScale;

                drawEchos(eCtx, mappedX, mappedY, pt.shape, mappedSize, pt.cCenter, pt.cEcho1, pt.cEcho2);
            }

            const link = document.createElement('a');
            link.download = `asset-master-${format.replace(':', 'x')}-${Date.now()}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        }

        function clearCanvas() {
            strokeHistory = [];
            resetCanvasBackground(ctx, canvas.width, canvas.height);
            document.getElementById('status-text').innerText = "Lienzo Limpio";
        }
    </script>
</body>
</html>

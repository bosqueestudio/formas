 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Blob Generator OS</title>
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --panel-bg: #1a1a1a;
            --text-light: #ffffff;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            overflow: hidden;
            color: var(--text-light);
        }

        /* UI SIDEBAR PANEL */
        .toolbar {
            width: 320px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            overflow-y: auto;
            flex-shrink: 0;
        }

        h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 5px 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            color: #fff;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .color-pickers {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        label {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #888;
        }

        .label-val {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label-val span {
            font-size: 0.75rem;
            color: #fff;
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
        }

        select, input[type="color"], button, input[type="range"] {
            width: 100%;
            padding: 10px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            background: #222;
            color: #fff;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        select:hover, button:hover {
            background: #2a2a2a;
            border-color: #555;
        }

        input[type="color"] {
            height: 40px;
            padding: 2px;
            border-radius: 4px;
        }

        /* Toggle Switches & Sliders custom look */
        input[type="range"] {
            -webkit-appearance: none;
            background: #222;
            padding: 5px 0;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            background: #fff;
            border: 1px solid #000;
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .radio-btn {
            display: none;
        }

        .radio-label {
            display: block;
            text-align: center;
            background: #222;
            padding: 10px;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .radio-btn:checked + .radio-label {
            background: #fff;
            color: #000;
            font-weight: bold;
            border-color: #fff;
        }

        .btn-clear { color: #ff5555; border-color: #552222; }
        .btn-clear:hover { background: #331111; }
        
        .btn-action { background: #ffffff; color: #000000; font-weight: bold; text-transform: uppercase; }
        .btn-action:hover { background: #dddddd; }

        .btn-anim { background: #007bff; color: white; font-weight: bold; text-transform: uppercase;}
        .btn-anim:hover { background: #0056b3; }

        .download-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        /* CANVAS CONTAINER */
        .canvas-container {
            flex-grow: 1;
            height: 100%;
            position: relative;
            background: var(--bg-dark);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .status-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.75rem;
            color: #555;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>Blob Generator OS</h2>
        
        <div class="tool-group">
            <label>Pixel Shape</label>
            <select id="pixel-shape">
                <option value="circle">Circle</option>
                <option value="square">Square</option>
                <option value="diamond">Diamond</option>
            </select>
        </div>

        <div class="tool-group">
            <label>Color Combination</label>
            <div class="color-pickers">
                <div>
                    <label style="font-size:10px;">Center</label>
                    <input type="color" id="color-center" value="#f4f3b6">
                </div>
                <div>
                    <label style="font-size:10px;">Echo 1</label>
                    <input type="color" id="color-echo1" value="#e3a7fd">
                </div>
                <div>
                    <label style="font-size:10px;">Echo 2</label>
                    <input type="color" id="color-echo2" value="#9ef8db">
                </div>
            </div>
        </div>

        <div class="tool-group">
            <label>Color Fusion (Blur)</label>
            <div class="radio-group">
                <input type="radio" name="color-fusion" id="fusion-off" value="off" checked class="btn-ghost radio-btn">
                <label for="fusion-off" class="radio-label">Sharp</label>
                
                <input type="radio" name="color-fusion" id="fusion-on" value="on" class="btn-ghost radio-btn">
                <label for="fusion-on" class="radio-label">Fused</label>
            </div>
        </div>

        <div class="tool-group">
            <label>Brush Stroke</label>
            <div class="radio-group">
                <input type="radio" name="stroke-option" id="stroke-on" value="on" checked class="radio-btn">
                <label for="stroke-on" class="radio-label">With Stroke</label>
                
                <input type="radio" name="stroke-option" id="stroke-off" value="off" class="radio-btn">
                <label for="stroke-off" class="radio-label">No Stroke</label>
            </div>
        </div>

        <div class="tool-group">
            <div class="label-val">
                <label>Brush Scale</label>
                <span id="scale-val">60%</span>
            </div>
            <input type="range" id="pixel-scale-slider" min="10" max="100" step="10" value="60" oninput="updateScaleLabel(this.value)">
        </div>

        <div class="tool-group">
            <div class="label-val">
                <label>Imperfect Behavior</label>
                <span id="clumsy-val">Organic</span>
            </div>
            <input type="range" id="brush-clumsy-slider" min="1" max="3" step="1" value="2" oninput="updateClumsyLabel(this.value)">
        </div>

        <hr style="border:0; border-top: 1px solid var(--border-color); width:100%; margin: 5px 0;">

        <button class="btn-clear" onclick="clearCanvas()">Clear Canvas</button>
        <button class="btn-anim" onclick="playDrawingAnimation()">▶ Re-Animate Trazo</button>
        
        <div class="tool-group">
            <label>Export Static Assets</label>
            <div class="download-grid">
                <button class="btn-action" style="font-size:11px;" onclick="saveAsset('16:9')">16:9 (HD)</button>
                <button class="btn-action" style="font-size:11px;" onclick="saveAsset('3:5')">3:5 (Vertical)</button>
            </div>
        </div>
    </div>

    <div class="canvas-container" id="canvas-holder">
        <canvas id="paintCanvas"></canvas>
        <div class="status-info" id="status-text">Dark Canvas Active</div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-holder');

        let strokeHistory = []; 
        let isDrawing = false;

        let clumsyX = 0;
        let clumsyY = 0;

        function initCanvasSize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            resetCanvasBackground(ctx, canvas.width, canvas.height);
            redrawFromHistory();
        }

        window.addEventListener('resize', initCanvasSize);
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(initCanvasSize, 100);
        });

        function resetCanvasBackground(context, width, height) {
            context.fillStyle = "#0d0d0d"; 
            context.fillRect(0, 0, width, height);
        }

        // Handle dynamic UI Label adjustments
        function updateScaleLabel(val) {
            document.getElementById('scale-val').innerText = val + '%';
        }

        function updateClumsyLabel(val) {
            const labels = ["Settle", "Organic", "Wild"];
            document.getElementById('clumsy-val').innerText = labels[val - 1];
        }

        function drawEchos(context, x, y, shape, size, cCenter, cEcho1, cEcho2, useStroke, useBlur) {
            context.save();
            
            // Apply Dynamic Gaussian Blur Filtering if turned on
            if(useBlur) {
                context.filter = `blur(${size * 0.12}px)`;
            }

            // Global 1px black stroke setup
            context.strokeStyle = '#000000';
            context.lineWidth = 1;

            // Echo Layer 2 (Outer)
            context.fillStyle = cEcho2;
            renderSingleGeom(context, x, y, shape, size * 1.3);
            if (useStroke) context.stroke();

            // Echo Layer 1 (Middle)
            context.fillStyle = cEcho1;
            renderSingleGeom(context, x, y, shape, size * 1.15);
            if (useStroke) context.stroke();

            // Core Center Layer
            context.fillStyle = cCenter;
            renderSingleGeom(context, x, y, shape, size);
            if (useStroke) context.stroke();

            context.restore();
        }

        function renderSingleGeom(context, x, y, shape, size) {
            context.beginPath();
            if (shape === 'circle') {
                context.arc(x, y, size / 2, 0, Math.PI * 2);
            } else if (shape === 'square') {
                context.rect(x - size / 2, y - size / 2, size, size);
            } else if (shape === 'diamond') {
                context.moveTo(x, y - size / 2);
                context.lineTo(x + size / 2, y);
                context.lineTo(x, y + size / 2);
                context.lineTo(x - size / 2, y);
                context.closePath();
            }
            context.fill();
        }

        function addStrokePoint(rawX, rawY, isNewNode = false) {
            // Mapping UI values on the fly
            const clumsySliderVal = parseInt(document.getElementById('brush-clumsy-slider').value);
            const clumsyFactors = [0.15, 0.45, 0.85];
            const clumsyFactor = clumsyFactors[clumsySliderVal - 1];

            // Mapping custom % base slider into vector viewport units
            const percentScale = parseInt(document.getElementById('pixel-scale-slider').value);
            const calculatedSize = (percentScale / 100) * 160; 

            const strokeSetting = document.querySelector('input[name="stroke-option"]:checked').value === 'on';
            const fusionSetting = document.querySelector('input[name="color-fusion"]:checked').value === 'on';

            if (isNewNode) {
                clumsyX = rawX;
                clumsyY = rawY;
            } else {
                // Tracking inertia filters
                clumsyX += (rawX - clumsyX) * 0.25;
                clumsyY += (rawY - clumsyY) * 0.25;

                // Organic Jitter engine calculation
                const jitter = (calculatedSize * clumsyFactor) * 0.05;
                clumsyX += (Math.random() - 0.5) * jitter;
                clumsyY += (Math.random() - 0.5) * jitter;
            }

            const pointData = {
                x: clumsyX,
                y: clumsyY,
                shape: document.getElementById('pixel-shape').value,
                size: calculatedSize,
                cCenter: document.getElementById('color-center').value,
                cEcho1: document.getElementById('color-echo1').value,
                cEcho2: document.getElementById('color-echo2').value,
                stroke: strokeSetting,
                blur: fusionSetting
            };

            strokeHistory.push(pointData);
            
            // Direct rendering pass
            drawEchos(ctx, pointData.x, pointData.y, pointData.shape, pointData.size, pointData.cCenter, pointData.cEcho1, pointData.cEcho2, pointData.stroke, pointData.blur);
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;

            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }

            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function handleStart(e) {
            isDrawing = true;
            const coords = getCanvasCoords(e);
            addStrokePoint(coords.x, coords.y, true);
        }

        function handleMove(e) {
            if (!isDrawing) return;
            if (e.cancelable) e.preventDefault(); 
            const coords = getCanvasCoords(e);
            addStrokePoint(coords.x, coords.y, false);
        }

        function handleEnd() { isDrawing = false; }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd);

        function redrawFromHistory() {
            resetCanvasBackground(ctx, canvas.width, canvas.height);
            for(let pt of strokeHistory) {
                drawEchos(ctx, pt.x, pt.y, pt.shape, pt.size, pt.cCenter, pt.cEcho1, pt.cEcho2, pt.stroke, pt.blur);
            }
        }

        // CINEMATIC RE-ANIMATION ENGINE
        function playDrawingAnimation() {
            if (strokeHistory.length === 0) return;
            
            let index = 0;
            const totalPoints = strokeHistory.length;
            const statusTxt = document.getElementById('status-text');
            
            function animateLoop() {
                if (index === 0) {
                    resetCanvasBackground(ctx, canvas.width, canvas.height);
                }

                let progress = index / totalPoints;
                let stepSpeed = 1;

                if (progress < 0.15 || progress > 0.85) {
                    stepSpeed = Math.max(1, Math.floor(totalPoints * 0.008));
                } else {
                    stepSpeed = Math.max(2, Math.floor(totalPoints * 0.03));
                }

                const nextTarget = Math.min(index + stepSpeed, totalPoints);
                
                for (let i = index; i < nextTarget; i++) {
                    const pt = strokeHistory[i];
                    drawEchos(ctx, pt.x, pt.y, pt.shape, pt.size, pt.cCenter, pt.cEcho1, pt.cEcho2, pt.stroke, pt.blur);
                }

                index = nextTarget;
                statusTxt.innerText = `Animating: ${Math.floor(progress * 100)}%`;

                if (index < totalPoints) {
                    requestAnimationFrame(animateLoop);
                } else {
                    statusTxt.innerText = `Animation Done`;
                }
            }
            
            requestAnimationFrame(animateLoop);
        }

        // HIGH RES EXPORT MATRIX
        function saveAsset(format) {
            if (strokeHistory.length === 0) {
                alert("Canvas is empty!");
                return;
            }

            const exportCanvas = document.createElement('canvas');
            const eCtx = exportCanvas.getContext('2d');

            let targetW = 1920; let targetH = 1080;
            if (format === '3:5') { targetW = 1080; targetH = 1350; }

            exportCanvas.width = targetW;
            exportCanvas.height = targetH;
            resetCanvasBackground(eCtx, targetW, targetH);

            const scaleX = targetW / canvas.width;
            const scaleY = targetH / canvas.height;
            const masterScale = Math.min(scaleX, scaleY) * 0.85; 

            const offsetX = (targetW - canvas.width * masterScale) / 2;
            const offsetY = (targetH - canvas.height * masterScale) / 2;

            for (let pt of strokeHistory) {
                const mappedX = pt.x * masterScale + offsetX;
                const mappedY = pt.y * masterScale + offsetY;
                const mappedSize = pt.size * masterScale;

                drawEchos(eCtx, mappedX, mappedY, pt.shape, mappedSize, pt.cCenter, pt.cEcho1, pt.cEcho2, pt.stroke, pt.blur);
            }

            const link = document.createElement('a');
            link.download = `asset-${format.replace(':', 'x')}-${Date.now()}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        }

        function clearCanvas() {
            strokeHistory = [];
            resetCanvasBackground(ctx, canvas.width, canvas.height);
            document.getElementById('status-text').innerText = "Canvas Cleared";
        }
    </script>
</body>
</html>

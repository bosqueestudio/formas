<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Scribble Generator OS</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #141414;
            --text-light: #ffffff;
            --border-color: #262626;
            --accent-blue: #007bff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            overflow: hidden;
            color: var(--text-light);
        }

        /* BARRA DE HERRAMIENTAS */
        .toolbar {
            width: 320px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            overflow-y: auto;
            flex-shrink: 0;
            box-shadow: 10px 0 30px rgba(0,0,0,0.7);
        }

        h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 5px 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            color: #fff;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tool-group label {
            font-size: 0.72rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #777;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid var(--border-color);
            cursor: pointer;
            outline: none;
        }

        /* Estilo para los sliders */
        input[type="range"] {
            -webkit-appearance: none;
            height: 6px;
            background: #262626;
            margin-top: 10px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent-blue);
            cursor: pointer;
            border-radius: 50%;
        }

        /* ESPACIO DE TRABAJO */
        .workspace-container {
            flex-grow: 1;
            height: 100%;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* LIENZO DE DIBUJO */
        canvas {
            background: #ffffff;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            cursor: crosshair;
            display: block;
        }

        .status-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.7rem;
            color: #555;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>Scribble OS</h2>
        
        <div class="tool-group">
            <label>Scribble Spacing (0-100)</label>
            <input type="range" id="scribble-spacing" min="0" max="100" value="50">
        </div>
        
        <div class="tool-group">
            <label>Pixel Shape</label>
            <select id="pixel-shape">
                <option value="organic">Organic Scribble</option>
                <option value="messy">Chaos Mesh</option>
            </select>
        </div>
        
        <div class="tool-group">
            <label>Text Interpret Engine</label>
            <input type="text" id="interpret-text-input" placeholder="CHAOS" style="width: 100%; padding: 10px; background: #1a1a1a; color: #fff; border: 1px solid var(--border-color); outline: none;">
            <button onclick="interpretTextToScribbles()" style="width: 100%; padding: 10px; margin-top: 5px; background: var(--accent-blue); color: white; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase;">Generate Vector</button>
        </div>
        
        <button onclick="saveAsset()" style="width: 100%; padding: 10px; margin-top: auto; background: #fff; color: #000; border: none; font-weight: bold; text-transform: uppercase;">Save Asset (.PNG)</button>
    </div>

    <div class="workspace-container">
        <canvas id="paintCanvas" width="1080" height="1350"></canvas>
        <div class="status-info">Dark Canvas Active | S: 50</div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let scribbleHistory = [];

        // Limpiar lienzo al cargar
        resetCanvasBackground();

        function resetCanvasBackground() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: ((e.clientX - rect.left) / rect.width) * canvas.width,
                y: ((e.clientY - rect.top) / rect.height) * canvas.height
            };
        }

        // Función de garabato orgánico
        function drawScribble(x, y, lx, ly, isNewNode = false) {
            ctx.strokeStyle = "rgba(244, 243, 182, 0.9)"; // Amarillo pálido del original
            ctx.lineWidth = 2 + Math.random() * 3; // Grosor variable para efecto "torpe"
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            ctx.beginPath();
            if (isNewNode) {
                ctx.moveTo(x, y);
                // Pequeño jitter inicial para simular imperfección de inicio
                ctx.lineTo(x + (Math.random() - 0.5) * 5, y + (Math.random() - 0.5) * 5);
            } else {
                ctx.moveTo(lx, ly);
                // Interpolación con ruido orgánico para "torpeza"
                const steps = 10;
                for (let i = 1; i <= steps; i++) {
                    const t = i / steps;
                    const jitterX = (Math.random() - 0.5) * 10; // Intensidad de "torpeza"
                    const jitterY = (Math.random() - 0.5) * 10;
                    ctx.lineTo(
                        lx + (x - lx) * t + jitterX,
                        ly + (y - ly) * t + jitterY
                    );
                }
            }
            ctx.stroke();

            // Guardar para historial (para re-animar)
            scribbleHistory.push({ x, y, lx, ly, isNewNode });
        }

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const pos = getMousePos(e);
            lastX = pos.x;
            lastY = pos.y;
            drawScribble(lastX, lastY, lastX, lastY, true);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const pos = getMousePos(e);
            
            // Lógica de espaciado: solo dibujar si se ha movido lo suficiente
            const spacing = parseInt(document.getElementById('scribble-spacing').value);
            const dist = Math.hypot(pos.x - lastX, pos.y - lastY);
            // Umbral inverso: 100 (unido) -> umbral bajo, 0 (separado) -> umbral alto
            const threshold = (100 - spacing) * 0.2; 

            if (dist > threshold) {
                drawScribble(pos.x, pos.y, lastX, lastY, false);
                lastX = pos.x;
                lastY = pos.y;
            }
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);

        function interpretTextToScribbles() {
            // Lógica compleja para interpretar texto no implementada en este demo,
            // pero limpia el lienzo como base.
            resetCanvasBackground();
            scribbleHistory = [];
        }

        function saveAsset() {
            // Guardar sin fondo (transparente) no implementado en este demo.
            const link = document.createElement('a');
            link.download = 'scribble_asset.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
